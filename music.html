<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music | ERIMITIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com" rel="stylesheet">
<style>
  :root{
    --bg:#02020a;--steel:#5B9FD4;--white:#f0ede8;--gold-dim:#96781E;
    --font-d:'Cinzel',serif;--font-b:'Crimson Text',serif;
  }
  body{background:var(--bg);color:var(--white);font-family:var(--font-b);min-height:100vh;margin:0;display:flex;flex-direction:column;}
  nav{position:fixed;top:0;width:100%;z-index:200;padding:1.6rem;display:flex;justify-content:center;background:rgba(2,2,10,0.97);}
  .nav-links{list-style:none;display:flex;gap:2.8rem;padding:0;}
  .nav-links a{font-family:var(--font-d);font-size:0.56rem;letter-spacing:3px;color:var(--gold-dim);text-decoration:none;text-transform:uppercase;}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7rem 2rem;text-align:center;}
  .waveform-wrap{position:relative;width:100%;max-width:500px;height:120px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  #waveCanvas{position:absolute;inset:0;width:100%;height:100%;border-bottom:1px solid rgba(91,159,212,0.12);}
  .play-btn{z-index:2;width:56px;height:56px;border-radius:50%;border:1px solid rgba(91,159,212,0.35);background:rgba(91,159,212,0.06);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .play-btn svg{width:18px;height:18px;fill:var(--steel);margin-left:3px;}
  .audio-label{font-family:var(--font-d);font-size:0.46rem;letter-spacing:4px;color:rgba(91,159,212,0.45);text-transform:uppercase;margin-top:2.5rem;}
</style>
</head>
<body>

<!-- THE FIXED AUDIO ENGINE -->
<audio id="myAudio" preload="auto">
  <!-- 1. The 'raw=1' version (Best for Safari/Mac) -->
  <source src="https://www.dropbox.com" type="audio/mp4">
  <!-- 2. The 'dl=1' version (Fallback) -->
  <source src="https://www.dropbox.com" type="audio/mp4">
</audio>

<nav>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="music.html" style="color:var(--steel)">Music</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<main>
  <div class="content">
    <div class="waveform-wrap" onclick="toggleAudio()">
      <canvas id="waveCanvas"></canvas>
      <div class="play-btn">
        <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
    </div>
    <p class="audio-label" id="audioLabel">Click to Play Preview</p>
  </div>
</main>

<script>
  const audio = document.getElementById('myAudio');
  const playIcon = document.getElementById('playIcon');
  const audioLabel = document.getElementById('audioLabel');

  function toggleAudio() {
    if (audio.paused) {
      // Force reload if first attempt fails
      audio.play().catch(() => {
          audio.load();
          audio.play();
      });
      audioLabel.innerText = "Now Playing";
      playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    } else {
      audio.pause();
      audioLabel.innerText = "Paused";
      playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    }
  }

  // Waveform Graphic
  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 500; canvas.height = 120;
  ctx.strokeStyle = '#5B9FD4'; ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i < canvas.width; i += 8) {
    let h = Math.random() * 30 + 10;
    ctx.moveTo(i, 60 - h/2); ctx.lineTo(i, 60 + h/2);
  }
  ctx.stroke();
</script>
</body>
</html>
