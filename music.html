<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERIMITIS | Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <style>
        :root { --bg: #02020a; --steel: #5B9FD4; --gold: #B8952A; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Text', serif; min-height: 100vh; display: flex; flex-direction: column; }

        .brand-header { position: absolute; top: 0; width: 100%; text-align: center; padding-top: 20px; }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 8vw, 2.5rem); letter-spacing: 15px; color: var(--steel); }

        .desktop-nav { position: fixed; top: 30px; left: 40px; z-index: 1000; }
        .hamburger span { display: block; width: 30px; height: 2px; background: var(--steel); margin-bottom: 8px; }

        .mobile-nav-boxes { display: none; width: 100%; padding: 10px; flex-direction: column; gap: 10px; position: fixed; bottom: 0; z-index: 1000; background: var(--bg); }
        .nav-box { border: 1px solid var(--steel); padding: 20px; text-decoration: none; color: var(--white); font-family: 'Cinzel', serif; text-align: center; }

        @media (max-width: 1024px) { 
            .desktop-nav { display: none; } .mobile-nav-boxes { display: flex; } 
            footer { padding-bottom: 300px; }
        }

        #waveform { width: 100%; height: 150px; background: rgba(91, 159, 212, 0.05); margin-bottom: 30px; border: 1px solid var(--steel); }
        .play-btn { background: transparent; border: 1px solid var(--steel); color: var(--steel); padding: 15px 40px; font-family: 'Cinzel', serif; letter-spacing: 4px; cursor: pointer; transition: 0.4s; }
        .play-btn:hover { background: var(--steel); color: var(--bg); }

        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 10%; }
        footer { padding: 40px 0; text-align: center; font-family: 'Cinzel', serif; color: var(--steel); font-size: 0.6rem; letter-spacing: 3px; }
    </style>
</head>
<body>
    <nav class="desktop-nav" onclick="toggleMenu()"><div class="hamburger"><span></span><span></span><span></span></div></nav>
    <header class="brand-header"><h1>MUSIC</h1></header>
    <main>
        <div id="waveform"></div>
        <button id="playBtn" class="play-btn" onclick="wavesurfer.playPause()">ACTIVATE</button>
    </main>
    <footer>&copy; 2026 ERIMITIS. ALL RIGHTS RESERVED.</footer>
    <nav class="mobile-nav-boxes">
        <a href="index.html" class="nav-box">HOME</a><a href="about.html" class="nav-box">ABOUT</a>
        <a href="music.html" class="nav-box" style="background: var(--steel); color: var(--bg);">MUSIC</a>
        <a href="contact.html" class="nav-box">CONTACT</a>
    </nav>
    <script>
        function toggleMenu() { /* same as index */ }
        const wavesurfer = WaveSurfer.create({ container: '#waveform', waveColor: '#5B9FD4', progressColor: '#ffffff', barWidth: 2 });
        wavesurfer.load(encodeURIComponent('preview.mp3  1.m4a'));
    </script>
</body>
</html>
