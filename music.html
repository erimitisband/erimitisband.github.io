<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music | Erimitis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Crimson+Text&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #02020a; --steel: #5B9FD4; --gray: #B8952A; --white: #f0ede8; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--white); font-family: 'Crimson Text', serif; width: 100%; min-height: 100vh; overflow-x: hidden; }

        /* Background & Stars */
        .hero-bg { position: fixed; top: 0; left: 0; width: 115%; height: 115%; background: url('logo.jpg') center/cover no-repeat; opacity: 0.15; z-index: -2; animation: drift 20s infinite alternate linear; }
        @keyframes drift { from { transform: translate(0, 0); } to { transform: translate(-3%, -3%); } }
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 100%); z-index: -1; pointer-events: none; }
        #starCanvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* Navigation */
        nav { text-align: center; padding: 40px 0; }
        nav a { font-family: 'Cinzel', serif; color: var(--gray); text-decoration: none; margin: 0 2vw; font-size: 1.2rem; transition: 0.3s; }
        nav a:hover, nav a.active { color: var(--steel); }
        .mobile-nav { display: none; flex-direction: column; width: 100%; }
        .nav-card { width: 100%; padding: 5vh 0; text-align: center; border-bottom: 1px solid rgba(91, 159, 212, 0.1); color: var(--steel); font-family: 'Cinzel', serif; text-decoration: none; font-size: 5vw; }

        /* Music Player UI */
        .container { max-width: 90%; margin: 0 auto; text-align: center; padding: 20px; }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 8vw, 4rem); letter-spacing: 0.5rem; margin-bottom: 2rem; }
        #waveform { width: 100%; height: 30vh; background: rgba(255,255,255,0.02); border-radius: 8px; margin-bottom: 20px; }
        .controls { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        button { background: transparent; border: 1px solid var(--gray); color: var(--gray); padding: 15px 50px; font-family: 'Cinzel', serif; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        button:hover { border-color: var(--steel); color: var(--steel); }
        input[type=range] { width: 80%; accent-color: var(--steel); cursor: pointer; }
        #time { font-family: 'Crimson Text', serif; font-size: 1.2rem; color: var(--steel); margin-top: 10px; }

        @media (max-width: 768px) {
            nav { display: none; }
            .mobile-nav { display: flex; }
        }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    <div class="vignette"></div>
    <canvas id="starCanvas"></canvas>

    <div class="mobile-nav">
        <a href="index.html" class="nav-card">HOME</a>
        <a href="about.html" class="nav-card">ABOUT</a>
        <a href="music.html" class="nav-card" style="background: rgba(91,159,212,0.05)">MUSIC</a>
        <a href="contact.html" class="nav-card">CONTACT</a>
    </div>

    <nav>
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="music.html" class="active">MUSIC</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <div class="container">
        <h1>PREVIEW</h1>
        <canvas id="waveform"></canvas>
        <div class="controls">
            <button id="playBtn">PLAY</button>
            <input type="range" id="seek" value="0">
            <div id="time">0:00 / 0:00</div>
        </div>
    </div>

    <audio id="track" src="https://erimitisband.github.io/preview.mp3" crossorigin="anonymous"></audio>

    <script>
        // Stars
        const sCanvas = document.getElementById('starCanvas');
        const sCtx = sCanvas.getContext('2d');
        let stars = [];
        function resize() { sCanvas.width = window.innerWidth; sCanvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        for(let i=0; i<200; i++) stars.push({ x: Math.random()*sCanvas.width, y: Math.random()*sCanvas.height, r: Math.random()*1.5 });
        function drawStars() {
            sCtx.clearRect(0,0,sCanvas.width, sCanvas.height);
            sCtx.fillStyle = "rgba(140, 180, 214, 0.6)";
            stars.forEach(s => { sCtx.beginPath(); sCtx.arc(s.x, s.y, s.r, 0, Math.PI*2); sCtx.fill(); });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // Music & Waveform Fix
        const audio = document.getElementById('track');
        const wCanvas = document.getElementById('waveform');
        const wCtx = wCanvas.getContext('2d');
        const playBtn = document.getElementById('playBtn');
        const seek = document.getElementById('seek');
        const timeDisplay = document.getElementById('time');

        let audioCtx, analyser, source, data;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 128;
            data = new Uint8Array(analyser.frequencyBinCount);
        }

        playBtn.onclick = () => {
            // Wake up audio context on first click
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (audio.paused) {
                audio.play();
                playBtn.innerText = "PAUSE";
                renderWave();
            } else {
                audio.pause();
                playBtn.innerText = "PLAY";
            }
        };

        function renderWave() {
            if (audio.paused) return;
            requestAnimationFrame(renderWave);
            analyser.getByteFrequencyData(data);
            
            wCanvas.width = wCanvas.offsetWidth;
            wCanvas.height = wCanvas.offsetHeight;
            
            wCtx.clearRect(0, 0, wCanvas.width, wCanvas.height);
            wCtx.fillStyle = "#5B9FD4"; 
            
            const barWidth = (wCanvas.width / data.length) * 2;
            data.forEach((v, i) => {
                const h = (v / 255) * wCanvas.height;
                wCtx.fillRect(i * (barWidth + 2), wCanvas.height - h, barWidth, h);
            });
        }

        audio.ontimeupdate = () => {
            seek.value = (audio.currentTime / audio.duration) * 100 || 0;
            let cur = Math.floor(audio.currentTime);
            let dur = Math.floor(audio.duration || 0);
            timeDisplay.innerText = `${Math.floor(cur/60)}:${(cur%60).toString().padStart(2,'0')} / ${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,'0')}`;
        };
        seek.oninput = () => audio.currentTime = (seek.value/100) * audio.duration;
    </script>
</body>
</html>
