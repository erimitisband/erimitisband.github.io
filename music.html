<main style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 140px 10% 0;">
    <div id="waveform" style="width: 100%; max-width: 800px; height: 128px; margin-bottom: 40px; background: rgba(91, 159, 212, 0.05); border: 1px solid rgba(91, 159, 212, 0.1);"></div>
    <button id="playBtn" class="play-btn" onclick="playAudio()" style="background: transparent; border: 1px solid var(--steel); color: var(--steel); padding: 15px 50px; font-family: 'Cinzel'; cursor: pointer; opacity: 0.5;">SUMMONING...</button>
</main>

<script>
    const wavesurfer = WaveSurfer.create({ container: '#waveform', waveColor: '#334c61', progressColor: '#5B9FD4', barWidth: 2, height: 128 });
    wavesurfer.load('preview.mp3');
    
    wavesurfer.on('ready', () => {
        const btn = document.getElementById('playBtn');
        btn.innerText = 'ACTIVATE';
        btn.style.opacity = '1';
    });

    wavesurfer.on('error', () => { document.getElementById('playBtn').innerText = 'ERROR: SIGNAL LOST'; });

    function playAudio() {
        wavesurfer.playPause();
        document.getElementById('playBtn').innerText = wavesurfer.isPlaying() ? 'PAUSE' : 'ACTIVATE';
    }
</script>
