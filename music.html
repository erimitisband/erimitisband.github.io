<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERIMITIS | Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <style>
        :root { --bg: #02020a; --steel: #4682B4; --gold: #D4AF37; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Text', serif; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        .desktop-nav { display: flex; align-items: center; padding: 40px 50px; position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--bg); }
        .hamburger { display: flex; flex-direction: column; gap: 10px; cursor: pointer; width: 35px; z-index: 2001; }
        .hamburger span { width: 100%; height: 1px; background-color: var(--gold); }
        
        #fullscreenMenu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(2, 2, 10, 0.98); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
        #fullscreenMenu a { color: var(--white); font-family: 'Cinzel', serif; font-size: 2.5rem; letter-spacing: 10px; text-decoration: underline; text-decoration-color: var(--steel); text-underline-offset: 15px; margin: 25px 0; }

        .mobile-nav-boxes { display: none; width: 100%; padding: 20px; justify-content: center; gap: 8px; flex-wrap: wrap; position: fixed; top: 0; z-index: 1000; background: var(--bg); }
        .nav-box { border: 1px solid var(--gold); padding: 10px 15px; text-decoration: none; color: var(--white); font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 2px; }

        @media (max-width: 1024px) { .desktop-nav { display: none; } .mobile-nav-boxes { display: flex; } }

        .brand-header { margin-top: 180px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 8vw, 2.5rem); letter-spacing: 15px; }
        
        main { flex: 1; padding: 50px 10%; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        #waveform { width: 100%; height: 150px; background: rgba(70, 130, 180, 0.05); margin-bottom: 30px; }
        .play-btn { background: transparent; border: 1px solid var(--gold); color: var(--white); padding: 15px 40px; font-family: 'Cinzel', serif; letter-spacing: 4px; cursor: pointer; transition: 0.3s; }
        .play-btn:hover { background: var(--gold); color: var(--bg); }
        footer { padding: 40px 0; text-align: center; font-family: 'Cinzel', serif; color: var(--gold); font-size: 0.6rem; letter-spacing: 3px; }
    </style>
</head>
<body>
    <nav class="desktop-nav"><div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div></nav>
    <nav class="mobile-nav-boxes">
        <a href="index.html" class="nav-box">HOME</a>
        <a href="about.html" class="nav-box">ABOUT</a>
        <a href="music.html" class="nav-box" style="background: var(--gold); color: var(--bg);">MUSIC</a>
        <a href="contact.html" class="nav-box">CONTACT</a>
    </nav>
    <div id="fullscreenMenu">
        <div style="position: absolute; top: 45px; left: 50px; color: var(--gold); cursor: pointer; font-family: 'Cinzel';" onclick="toggleMenu()">[ CLOSE ]</div>
        <a href="index.html">HOME</a><a href="about.html">ABOUT</a><a href="music.html">MUSIC</a><a href="contact.html">CONTACT</a>
    </div>
    <div class="brand-header"><h1>MUSIC</h1></div>
    <main>
        <div id="waveform"></div>
        <button class="play-btn" onclick="wavesurfer.playPause()">ACTIVATE</button>
    </main>
    <footer>&copy; 2026 ERIMITIS. ALL RIGHTS RESERVED.</footer>
    <script>
        function toggleMenu() { const m = document.getElementById('fullscreenMenu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        const wavesurfer = WaveSurfer.create({ container: '#waveform', waveColor: '#4682B4', progressColor: '#D4AF37', barWidth: 2 });
        wavesurfer.load(encodeURIComponent('preview.mp3  1.m4a'));
    </script>
</body>
</html>
