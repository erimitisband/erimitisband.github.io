<body>
    <div class="hero-bg"></div>
    <canvas id="starCanvas"></canvas>

    <h1>ERIMITIS</h1>

    <div class="content-wrap">
        <canvas id="waveform" style="width:100%; height:120px;"></canvas>
        <div style="margin-top:20px;">
            <button id="playBtn" style="background:transparent; border:1px solid var(--gray); color:var(--gray); padding:10px 30px; font-family:Cinzel; cursor:pointer;">PLAY PREVIEW</button>
            <br><br>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8" style="width:200px; accent-color:var(--steel);">
            <div class="gold-leaf" style="margin-top:40px; font-size:1.2rem;">MUSIC COMING SOON</div>
        </div>
    </div>

    <div class="mobile-nav">
        <a href="index.html" class="nav-block">HOME</a>
        <a href="about.html" class="nav-block">ABOUT</a>
        <a href="music.html" class="nav-block" style="color:var(--steel)">MUSIC</a>
        <a href="contact.html" class="nav-block">CONTACT</a>
    </div>

    <nav>
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="music.html" class="active">MUSIC</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <audio id="track" src="https://erimitisband.github.io/preview.mp3" crossorigin="anonymous"></audio>

    <script>
        /* [Include Star Script from Index] */
        const audio = document.getElementById('track'); const wCanvas = document.getElementById('waveform'); const wCtx = wCanvas.getContext('2d');
        const playBtn = document.getElementById('playBtn'); let audioCtx, analyser, source, data;
        playBtn.onclick = () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser(); source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser); analyser.connect(audioCtx.destination);
                analyser.fftSize = 64; data = new Uint8Array(analyser.frequencyBinCount);
            }
            if (audio.paused) { audio.play(); playBtn.innerText = "PAUSE"; renderWave(); } 
            else { audio.pause(); playBtn.innerText = "PLAY PREVIEW"; }
        };
        function renderWave() {
            if (audio.paused) return; requestAnimationFrame(renderWave);
            analyser.getByteFrequencyData(data); wCanvas.width = wCanvas.offsetWidth; wCanvas.height = wCanvas.offsetHeight;
            wCtx.clearRect(0,0,wCanvas.width, wCanvas.height); wCtx.fillStyle = "#5B9FD4";
            const barWidth = (wCanvas.width / data.length);
            data.forEach((v, i) => { const h = (v/255) * wCanvas.height; wCtx.fillRect(i * barWidth, wCanvas.height - h, barWidth - 2, h); });
        }
    </script>
</body>
