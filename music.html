<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | ERIMITIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #02020a;
    --steel: #8CB4D6;
    --steel-glow: rgba(140,180,214,0.1);
    --white: #f0ede8;
    --gray: #888880;
    --dim: #333;
    --font-display: 'Cinzel', Georgia, serif;
    --font-body: 'Crimson Text', Georgia, serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; overflow-x: hidden; }

  body {
    background-color: var(--bg);
    color: var(--white);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.5rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(180deg, rgba(2,2,10,0.95) 0%, transparent 100%);
    backdrop-filter: blur(2px);
  }

  .nav-logo {
    font-family: var(--font-display);
    font-size: 0.7rem;
    letter-spacing: 5px;
    color: var(--steel);
    text-decoration: none;
    text-transform: uppercase;
  }

  nav ul { list-style: none; display: flex; gap: 2.5rem; }
  nav a {
    color: var(--gray);
    text-decoration: none;
    text-transform: uppercase;
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 3px;
    transition: color 0.3s ease;
    position: relative;
  }
  nav a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 0; height: 1px;
    background: var(--steel);
    transition: width 0.3s ease;
  }
  nav a:hover { color: var(--white); }
  nav a:hover::after, nav a.active::after { width: 100%; }
  nav a.active { color: var(--steel); }

  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8rem 2rem 4rem;
    text-align: center;
  }

  .page-label {
    font-family: var(--font-display);
    font-size: 0.55rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--steel);
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.2s forwards;
  }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 900;
    letter-spacing: 0.1em;
    color: var(--white);
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.4s forwards;
  }

  .divider-line {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--steel), transparent);
    margin: 0 auto 3rem;
    opacity: 0;
    animation: fadeIn 1s ease 0.6s forwards;
  }

  /* Contact cards */
  .contact-cards {
    display: flex;
    flex-direction: column;
    gap: 1px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 3rem;
  }

  .contact-card {
    padding: 1.8rem 2rem;
    border: 1px solid #0f0f0f;
    background: rgba(255,255,255,0.01);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    transition: all 0.3s ease;
    text-decoration: none;
    opacity: 0;
  }

  .contact-card:nth-child(1) { animation: fadeUp 1s ease 0.7s forwards; }
  .contact-card:nth-child(2) { animation: fadeUp 1s ease 0.9s forwards; }
  .contact-card:nth-child(3) { animation: fadeUp 1s ease 1.1s forwards; }

  .contact-card:hover {
    background: var(--steel-glow);
    border-color: rgba(140,180,214,0.15);
  }

  .card-label {
    font-family: var(--font-display);
    font-size: 0.5rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--steel);
  }

  .card-value {
    font-family: var(--font-body);
    font-size: 1.05rem;
    color: var(--gray);
    transition: color 0.3s ease;
  }

  .contact-card:hover .card-value { color: var(--white); }

  footer {
    position: relative;
    z-index: 2;
    padding: 2rem;
    text-align: center;
    border-top: 1px solid #0d0d0d;
  }

  .social-links { display: flex; justify-content: center; gap: 2.5rem; margin-bottom: 1rem; }
  .social-links a {
    color: var(--dim);
    text-decoration: none;
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: color 0.3s ease;
  }
  .social-links a:hover { color: var(--steel); }
  .copyright { font-family: var(--font-display); font-size: 0.55rem; letter-spacing: 3px; color: #222; text-transform: uppercase; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @media (max-width: 600px) {
    nav { padding: 1.2rem 1.5rem; }
    nav ul { gap: 1.2rem; }
    .contact-cards { max-width: 100%; }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<nav>
  <a href="index.html" class="nav-logo">Erimitis</a>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="music.html">Music</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
</nav>

<main>
  <p class="page-label">Get In Touch</p>
  <h1>Contact</h1>
  <div class="divider-line"></div>

  <div class="contact-cards">
    <a href="mailto:erimitisband@gmail.com" class="contact-card">
      <span class="card-label">Email</span>
      <span class="card-value">erimitisband@gmail.com</span>
    </a>
    <a href="https://instagram.com/erimitisband" target="_blank" class="contact-card">
      <span class="card-label">Instagram</span>
      <span class="card-value">@erimitisband</span>
    </a>
    <a href="https://tiktok.com/@erimitisband" target="_blank" class="contact-card">
      <span class="card-label">TikTok</span>
      <span class="card-value">@erimitisband</span>
    </a>
  </div>
</main>

<footer>
  <div class="social-links">
    <a href="https://instagram.com/erimitisband" target="_blank">Instagram</a>
    <a href="https://tiktok.com/@erimitisband" target="_blank">TikTok</a>
    <a href="mailto:erimitisband@gmail.com">Email</a>
  </div>
  <p class="copyright">&copy; 2026 Erimitis</p>
</footer>

<script>
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const stars = Array.from({ length: 180 }, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.2 + 0.2,
    a: Math.random(), speed: Math.random() * 0.004 + 0.001,
    phase: Math.random() * Math.PI * 2
  }));
  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = s.a * (0.4 + 0.6 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(140,180,214,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
</script>
</body>
</html>
