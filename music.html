<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERIMITIS | Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/wavesurfer.js"></script>
    <style>
        :root { --bg: #02020a; --steel: #4682B4; --gold: #D4AF37; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Text', serif; overflow-x: hidden; }
        .navbar { width: 100%; padding: 40px 50px; position: fixed; top: 0; z-index: 1000; display: flex; align-items: center; background: var(--bg); }
        .hamburger { display: flex; flex-direction: column; gap: 10px; cursor: pointer; width: 35px; position: absolute; left: 50px; }
        .hamburger span { width: 100%; height: 1px; background-color: var(--gold); }
        .brand-center { width: 100%; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(2.2rem, 8vw, 4.5rem); letter-spacing: 15px; color: var(--white); text-transform: uppercase; margin: 0; }
        #menu { display: none; list-style: none; text-align: center; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(2, 2, 10, 0.98); padding-top: 25vh; z-index: 2000; }
        #menu li { margin: 30px 0; }
        #menu a { text-decoration: underline; text-decoration-color: var(--steel); text-underline-offset: 12px; color: var(--white); font-family: 'Cinzel', serif; font-size: 2.2rem; letter-spacing: 8px; opacity: 0; transition: 0.4s; }
        .nav-list-mobile { display: none; }
        @media (max-width: 1023px) {
            .hamburger { display: none; }
            .navbar { padding: 25px; position: relative; }
            .nav-list-mobile { display: flex; justify-content: center; gap: 20px; background: rgba(70, 130, 180, 0.08); border: 1px solid rgba(70, 130, 180, 0.2); padding: 15px; margin: 20px auto 0; width: 90%; list-style: none; position: relative; z-index: 100; }
            .nav-list-mobile a { color: var(--gold); text-decoration: none; font-family: 'Cinzel'; font-size: 0.75rem; letter-spacing: 1.5px; }
        }
        main { padding: 250px 10% 100px; text-align: center; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; }
        #waveform { width: 100%; max-width: 900px; height: 180px; background: rgba(70, 130, 180, 0.03); margin: 0 auto; border: 1px solid rgba(70, 130, 180, 0.1); }
        .play-btn { background: transparent; border: 1px solid var(--gold); color: var(--white); padding: 15px 50px; font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 4px; cursor: pointer; transition: 0.3s; margin-top: 60px; align-self: center; }
        .play-btn:hover { background: var(--gold); color: var(--bg); }
    </style>
</head>
<body>
    <nav class="navbar"><div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div><div class="brand-center"><h1>MUSIC</h1></div></nav>
    <ul class="nav-list-mobile"><li><a href="index.html">HOME</a></li><li><a href="about.html">ABOUT</a></li><li><a href="music.html">MUSIC</a></li><li><a href="contact.html">CONTACT</a></li></ul>
    <main><div id="waveform"></div><button class="play-btn" onclick="wavesurfer.playPause()">ACTIVATE</button></main>
    <div id="menu"><div style="position: absolute; top: 45px; left: 50px; color: var(--gold); cursor: pointer; font-family: 'Cinzel';" onclick="toggleMenu()">[ CLOSE ]</div><ul style="list-style: none;"><li><a href="index.html">HOME</a></li><li><a href="about.html">ABOUT</a></li><li><a href="music.html">MUSIC</a></li><li><a href="contact.html">CONTACT</a></li></ul></div>
    <script>
        function toggleMenu() {
            const menu = document.getElementById('menu'); const links = document.querySelectorAll('#menu a'); const isVisible = menu.style.display === 'block';
            menu.style.display = isVisible ? 'none' : 'block';
            if (!isVisible) { setTimeout(() => { links.forEach((link, i) => { setTimeout(() => { link.style.opacity = '1'; }, i * 100); }); }, 50); } else { links.forEach(link => link.style.opacity = '0'); }
        }
        const wavesurfer = WaveSurfer.create({ container: '#waveform', waveColor: '#4682B4', progressColor: '#D4AF37', barWidth: 2, barGap: 3, height: 180, responsive: true, cursorColor: 'transparent' });
    </script>
</body>
</html>
