<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERIMITIS | Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <style>
        :root { --bg: #02020a; --steel: #5B9FD4; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Text', serif; min-height: 100vh; display: flex; flex-direction: column; }

        .brand-header { position: absolute; top: 0; width: 100%; text-align: center; padding-top: 20px; z-index: 10; }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 8vw, 2.5rem); letter-spacing: 15px; color: var(--steel); }

        /* Fixed Hamburger for PC */
        .desktop-nav { position: fixed; top: 30px; left: 40px; z-index: 1000; cursor: pointer; }
        .hamburger { display: flex; flex-direction: column; gap: 8px; width: 30px; }
        .hamburger span { width: 100%; height: 2px; background-color: var(--steel); }

        #fullscreenMenu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(2, 2, 10, 0.98); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
        #fullscreenMenu a { color: var(--white); font-family: 'Cinzel', serif; font-size: 2.5rem; letter-spacing: 10px; margin: 25px 0; text-decoration: none; border-bottom: 1px solid transparent; }
        #fullscreenMenu a:hover { border-bottom: 1px solid var(--steel); }

        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 100px 10% 0; }
        
        /* Waveform Container must have height */
        #waveform { width: 100%; max-width: 900px; height: 128px; margin-bottom: 40px; border: 1px solid rgba(91, 159, 212, 0.2); background: rgba(255,255,255,0.02); }
        
        .play-btn { background: transparent; border: 1px solid var(--steel); color: var(--steel); padding: 15px 40px; font-family: 'Cinzel', serif; letter-spacing: 4px; cursor: pointer; transition: 0.3s; }
        .play-btn:hover { background: var(--steel); color: var(--bg); }

        footer { padding: 40px 0; text-align: center; font-family: 'Cinzel', serif; color: var(--steel); font-size: 0.6rem; letter-spacing: 3px; }

        .mobile-nav-boxes { display: none; width: 100%; padding: 10px; flex-direction: column; gap: 10px; position: fixed; bottom: 0; z-index: 1000; background: var(--bg); }
        .nav-box { border: 1px solid var(--steel); padding: 20px; text-decoration: none; color: var(--white); font-family: 'Cinzel', serif; text-align: center; }

        @media (max-width: 1024px) { 
            .desktop-nav { display: none; } 
            .mobile-nav-boxes { display: flex; } 
            footer { padding-bottom: 300px; }
        }
    </style>
</head>
<body>
    <div class="desktop-nav" onclick="toggleMenu()">
        <div class="hamburger"><span></span><span></span><span></span></div>
    </div>

    <div id="fullscreenMenu">
        <div style="position: absolute; top: 35px; left: 40px; color: var(--steel); cursor: pointer; font-family: 'Cinzel';" onclick="toggleMenu()">[ CLOSE ]</div>
        <a href="index.html">HOME</a><a href="about.html">ABOUT</a><a href="music.html">MUSIC</a><a href="contact.html">CONTACT</a>
    </div>

    <header class="brand-header"><h1>MUSIC</h1></header>

    <main>
        <div id="waveform"></div>
        <button id="playBtn" class="play-btn" onclick="playAudio()">ACTIVATE</button>
    </main>

    <footer>&copy; 2026 ERIMITIS. ALL RIGHTS RESERVED.</footer>

    <nav class="mobile-nav-boxes">
        <a href="index.html" class="nav-box">HOME</a>
        <a href="about.html" class="nav-box">ABOUT</a>
        <a href="music.html" class="nav-box" style="background: var(--steel); color: var(--bg);">MUSIC</a>
        <a href="contact.html" class="nav-box">CONTACT</a>
    </nav>

    <script>
        function toggleMenu() {
            const m = document.getElementById('fullscreenMenu');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        // WaveSurfer Setup
        const wavesurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#334c61',
            progressColor: '#5B9FD4',
            cursorColor: '#ffffff',
            barWidth: 2,
            height: 128,
            responsive: true
        });

        // Load your file - ensure the path is exactly correct in your GitHub repo
        wavesurfer.load('preview.mp3'); 

        function playAudio() {
            wavesurfer.playPause();
            document.getElementById('playBtn').innerText = wavesurfer.isPlaying() ? 'PAUSE' : 'ACTIVATE';
        }
    </script>
</body>
</html>
