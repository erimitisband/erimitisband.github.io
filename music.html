<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music | ERIMITIS</title>
    <style>
        /* Shared Styles */
        :root { --bg-color: #070707; --text-color: #e0e0e0; --accent-color: #5a5a5a; --font-main: 'Helvetica Neue', Arial, sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-main); display: flex; flex-direction: column; min-height: 100vh; text-transform: uppercase; letter-spacing: 2px; }
        header { padding: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
        .logo img { max-width: 300px; height: auto; display: block; }
        nav ul { list-style: none; display: flex; gap: 2rem; }
        nav a { color: var(--accent-color); text-decoration: none; font-size: 0.9rem; transition: color 0.3s ease; }
        nav a:hover, nav a.active { color: #fff; }
        
        /* Music Specific */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #fff; }
        .status-box { border: 1px solid #1a1a1a; padding: 3rem; max-width: 600px; background: rgba(255,255,255,0.02); }
        .status-box p { text-transform: none; color: #888; letter-spacing: 1px; line-height: 1.6; }
        
        footer { padding: 2rem; text-align: center; }
        .social-links { display: flex; justify-content: center; gap: 1.5rem; }
        .social-links a { color: var(--accent-color); text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo"><img src="logo.png" alt="ERIMITIS"></a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="music.html" class="active">Music</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="status-box">
            <h1>Silence for now.</h1>
            <p>ERIMITIS is currently in the studio. New material is being forged. Follow our socials to be the first to hear the echoes.</p>
        </div>
    </main>
    <footer>
        <div class="social-links">
            <a href="#">Instagram</a><a href="#">Facebook</a><a href="#">YouTube</a>
        </div>
    </footer>
</body>
</html>
