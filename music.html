<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERIMITIS | Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/wavesurfer.js"></script>
    <style>
        /* ... Navigation CSS same as Index ... */
        main { padding: 100px 10%; text-align: center; }
        #waveform { width: 100%; height: 180px; background: rgba(70, 130, 180, 0.05); margin: 50px 0; border: 1px solid rgba(70, 130, 180, 0.2); }
        .play-btn { background: transparent; border: 1px solid #D4AF37; color: white; padding: 15px 45px; font-family: 'Cinzel'; cursor: pointer; letter-spacing: 3px; transition: 0.3s; }
        .play-btn:hover { background: #D4AF37; color: #02020a; }
    </style>
</head>
<body style="background:#02020a; color:white;">
    <main>
        <h2 style="font-family:'Cinzel'; color:#D4AF37; letter-spacing:8px;">THE FREQUENCY</h2>
        <div id="waveform"></div>
        <button class="play-btn" onclick="wavesurfer.playPause()">PLAY SYNC</button>
    </main>
    <script>
        const wavesurfer = WaveSurfer.create({ container: '#waveform', waveColor: '#4682B4', progressColor: '#D4AF37', barWidth: 3, height: 180, responsive: true });
        // wavesurfer.load('your-song-file.mp3');
    </script>
</body>
</html>
