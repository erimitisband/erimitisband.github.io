<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Erimitis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Crimson+Text&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #02020a; --steel: #5B9FD4; --gray: #B8952A; --white: #f0ede8; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--white); font-family: 'Crimson Text', serif; width: 100%; }

        .hero-bg { position: fixed; top: 0; left: 0; width: 115%; height: 115%; background: url('logo.jpg') center/cover no-repeat; opacity: 0.15; z-index: -2; animation: drift 20s infinite alternate linear; }
        @keyframes drift { from { transform: translate(0, 0); } to { transform: translate(-3%, -3%); } }
        #starCanvas { position: fixed; top: 0; left: 0; z-index: -1; }

        nav { text-align: center; padding: 40px 0; display: block; }
        nav a { font-family: 'Cinzel', serif; color: var(--gray); text-decoration: none; margin: 0 2vw; font-size: 1.2rem; transition: 0.3s; }
        nav a:hover, nav a.active { color: var(--steel); }

        .mobile-nav { display: none; flex-direction: column; width: 100%; }
        .nav-card { width: 100%; padding: 5vh 0; text-align: center; border-bottom: 1px solid rgba(91, 159, 212, 0.1); color: var(--steel); font-family: 'Cinzel', serif; text-decoration: none; font-size: 5vw; }

        .contact-box { max-width: 600px; margin: 0 auto; padding: 5vh 5vw; }
        h1 { text-align: center; font-family: 'Cinzel', serif; font-size: clamp(2rem, 8vw, 4rem); margin-bottom: 3rem; }
        
        .row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(184, 149, 42, 0.3); padding: 25px 0; transition: 0.3s; text-decoration: none; }
        .row:hover { border-bottom-color: var(--steel); }
        
        .label { font-family: 'Cinzel', serif; color: var(--gray); font-size: clamp(0.9rem, 3vw, 1.2rem); letter-spacing: 2px; transition: 0.3s; }
        .val { color: var(--white); font-style: italic; font-size: clamp(0.9rem, 3.5vw, 1.3rem); }
        .row:hover .label { color: var(--steel); }

        @media (max-width: 768px) {
            nav { display: none; }
            .mobile-nav { display: flex; }
        }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    <canvas id="starCanvas"></canvas>

    <div class="mobile-nav">
        <a href="index.html" class="nav-card">HOME</a>
        <a href="about.html" class="nav-card">ABOUT</a>
        <a href="music.html" class="nav-card">MUSIC</a>
        <a href="contact.html" class="nav-card" style="background: rgba(91,159,212,0.05)">CONTACT</a>
    </div>

    <nav>
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="music.html">MUSIC</a>
        <a href="contact.html" class="active">CONTACT</a>
    </nav>

    <div class="contact-box">
        <h1>CONTACT</h1>
        <a href="mailto:erimitisband@gmail.com" class="row">
            <span class="label">EMAIL</span>
            <span class="val">erimitisband@gmail.com</span>
        </a>
        <a href="https://instagram.com/erimitis_band" target="_blank" class="row">
            <span class="label">INSTAGRAM</span>
            <span class="val">@erimitis_band</span>
        </a>
        <a href="https://tiktok.com/@erimitisband" target="_blank" class="row">
            <span class="label">TIKTOK</span>
            <span class="val">@erimitisband</span>
        </a>
    </div>

    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        let stars = [];
        for(let i=0; i<200; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5 });
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(140, 180, 214, 0.6)";
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
