<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | ERIMITIS</title>
    <style>
        /* Shared Styles */
        :root { --bg-color: #070707; --text-color: #e0e0e0; --accent-color: #5a5a5a; --font-main: 'Helvetica Neue', Arial, sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-main); display: flex; flex-direction: column; min-height: 100vh; text-transform: uppercase; letter-spacing: 2px; }
        header { padding: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
        .logo img { max-width: 300px; height: auto; display: block; }
        nav ul { list-style: none; display: flex; gap: 2rem; }
        nav a { color: var(--accent-color); text-decoration: none; font-size: 0.9rem; }
        nav a:hover, nav a.active { color: #fff; }

        /* Contact Specific */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
        .contact-card { max-width: 500px; }
        h1 { font-size: 2.5rem; margin-bottom: 2rem; color: #fff; }
        .email-link { font-size: 1.2rem; color: #fff; text-decoration: none; border-bottom: 1px solid var(--accent-color); padding-bottom: 5px; transition: all 0.3s; }
        .email-link:hover { border-bottom: 1px solid #fff; }
        p { margin-top: 2rem; text-transform: none; color: #888; font-size: 0.9rem; }

        footer { padding: 2rem; text-align: center; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo"><img src="logo.png" alt="ERIMITIS"></a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="music.html">Music</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="contact-card">
            <h1>Get in touch</h1>
            <a href="mailto:erimitisband@gmail.com" class="email-link">ERIMITISBAND@GMAIL.COM</a>
            <p>For bookings, musician enquiries, or press: contact us via email or DM via Instagram.</p>
        </div>
    </main>
    <footer>
        </footer>
</body>
</html>
