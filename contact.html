    <canvas id="starCanvas"></canvas>
    <main>
        <h2>INQUIRIES</h2>
        <p>Reach out for collaborations or booking.</p>
        <form style="display: flex; flex-direction: column; gap: 20px; max-width: 450px; margin: 40px auto;">
            <input type="text" placeholder="Name" style="background: transparent; border: 1px solid var(--steel); color: white; padding: 12px; font-family: 'Crimson Text';">
            <textarea placeholder="Message" rows="5" style="background: transparent; border: 1px solid var(--steel); color: white; padding: 12px; font-family: 'Crimson Text';"></textarea>
            <button type="submit" style="background: var(--gold); border: none; padding: 15px; font-family: 'Cinzel'; cursor: pointer; color: var(--bg);">SEND</button>
        </form>
    </main>
