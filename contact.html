<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | ERIMITIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#02020a; --steel:#5B9FD4; --steel-dim:rgba(91,159,212,0.15);
    --white:#f0ede8; --gold:#B8952A; --gold-dim:#96781E; --silver:#B8B8B4;
    --font-d:'Cinzel',Georgia,serif; --font-b:'Crimson Text',Georgia,serif;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--white);font-family:var(--font-b);min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;}
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
  nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:1.6rem 3.5rem;display:flex;justify-content:center;align-items:center;background:linear-gradient(180deg,rgba(2,2,10,0.97) 0%,transparent 100%);}
  .nav-links{list-style:none;display:flex;gap:2.8rem;}
  .nav-links a{font-family:var(--font-d);font-size:0.56rem;letter-spacing:3px;color:var(--gold-dim);text-decoration:none;text-transform:uppercase;position:relative;padding-bottom:4px;transition:color 0.3s;}
  .nav-links a::after{content:'';position:absolute;bottom:0;left:50%;width:0;height:1px;background:var(--steel);transition:all 0.4s;transform:translateX(-50%);}
  .nav-links a:hover{color:var(--white);}
  .nav-links a:hover::after,.nav-links a.active::after{width:100%;}
  .nav-links a.active{color:var(--steel);}
  .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;}
  .hamburger span{display:block;width:22px;height:1px;background:var(--gold-dim);transition:all 0.3s;}
  .mobile-menu{display:none;position:fixed;inset:0;z-index:300;background:rgba(2,2,10,0.98);flex-direction:column;align-items:center;justify-content:center;gap:3rem;backdrop-filter:blur(8px);}
  .mobile-menu.open{display:flex;}
  .mobile-menu a{font-family:var(--font-d);font-size:1.1rem;letter-spacing:7px;color:var(--gold-dim);text-decoration:none;text-transform:uppercase;transition:color 0.3s;}
  .mobile-menu a:hover{color:var(--steel);}
  .mobile-close{position:absolute;top:1.8rem;right:2rem;font-family:var(--font-d);font-size:0.55rem;letter-spacing:3px;color:var(--gold-dim);cursor:pointer;text-transform:uppercase;background:none;border:none;transition:color 0.3s;}
  .mobile-close:hover{color:var(--white);}
  main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7rem 2rem 4rem;text-align:center;overflow:hidden;}
  .main-bg{position:fixed;inset:0;background:url('https://erimitisband.github.io/logo.jpg') center 30% / 55% no-repeat;opacity:0.12;filter:blur(0.5px) brightness(1.3);animation:drift 25s ease-in-out infinite alternate;z-index:0;will-change:transform;}
  .main-vignette{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse 80% 80% at 50% 40%,transparent 25%,rgba(2,2,10,0.7) 65%,rgba(2,2,10,0.98) 100%);pointer-events:none;}
  @keyframes drift{from{transform:scale(1);}to{transform:scale(1.05) translateY(-12px);}}
  .content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;max-width:500px;}
  .eyebrow{font-family:var(--font-d);font-size:0.52rem;letter-spacing:7px;color:var(--steel);text-transform:uppercase;margin-bottom:0.8rem;opacity:0;animation:fadeUp 1.2s ease 0.2s forwards;}
  h1{font-family:var(--font-d);font-weight:900;font-size:clamp(2rem,8vw,3.5rem);letter-spacing:0.2em;color:var(--white);margin-bottom:1rem;opacity:0;animation:fadeUp 1.2s ease 0.4s forwards;}
  .h-rule{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--steel),transparent);margin:0 auto 3rem;opacity:0;animation:fadeIn 1.2s ease 0.6s forwards;}
  .cards{display:flex;flex-direction:column;width:100%;gap:1px;}
  .card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.4rem;padding:1.6rem 1rem;border:1px solid #0d0d16;background:rgba(255,255,255,0.01);text-decoration:none;position:relative;overflow:hidden;transition:border-color 0.4s,transform 0.3s;opacity:0;}
  .card:nth-child(1){animation:fadeUp 1.2s ease 0.7s forwards;}
  .card:nth-child(2){animation:fadeUp 1.2s ease 0.9s forwards;}
  .card:nth-child(3){animation:fadeUp 1.2s ease 1.1s forwards;}
  .card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--steel-dim),transparent 60%);opacity:0;transition:opacity 0.4s;}
  .card:hover{border-color:rgba(91,159,212,0.25);transform:translateY(-2px);}
  .card:hover::before{opacity:1;}
  .c-label{font-family:var(--font-d);font-size:0.5rem;letter-spacing:5px;color:var(--steel);text-transform:uppercase;position:relative;z-index:1;}
  .c-value{font-family:var(--font-b);font-size:1.05rem;color:var(--gold);position:relative;z-index:1;transition:color 0.3s;}
  .card:hover .c-value{color:var(--white);}
  footer{position:relative;z-index:2;padding:1.5rem;text-align:center;border-top:1px solid #080810;}
  .copy{font-family:var(--font-d);font-size:0.46rem;letter-spacing:3px;color:#6B5418;text-transform:uppercase;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @media(max-width:768px){nav{padding:1.3rem 1.5rem;justify-content:center;}.nav-links{display:none;}.hamburger{display:flex;}main{padding:6rem 1.5rem 3rem;}}
  @media(max-width:380px){h1{font-size:2rem;letter-spacing:0.1em;}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-close" onclick="closeMobile()">&#x2715; Close</button>
  <a href="index.html" onclick="closeMobile()">Home</a>
  <a href="about.html" onclick="closeMobile()">About</a>
  <a href="music.html" onclick="closeMobile()">Music</a>
  <a href="contact.html" onclick="closeMobile()">Contact</a>
</div>
<nav>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="music.html">Music</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
  <div class="hamburger" onclick="openMobile()"><span></span><span></span><span></span></div>
</nav>
<main>
  <div class="main-bg"></div>
  <div class="main-vignette"></div>
  <div class="content">
    <p class="eyebrow">Get In Touch</p>
    <h1>CONTACT</h1>
    <div class="h-rule"></div>
    <div class="cards">
      <a href="mailto:erimitisband@gmail.com" class="card">
        <span class="c-label">Email</span>
        <span class="c-value">erimitisband@gmail.com</span>
      </a>
      <a href="https://instagram.com/erimitisband" target="_blank" class="card">
        <span class="c-label">Instagram</span>
        <span class="c-value">@erimitisband</span>
      </a>
      <a href="https://tiktok.com/@erimitisband" target="_blank" class="card">
        <span class="c-label">TikTok</span>
        <span class="c-value">@erimitisband</span>
      </a>
    </div>
  </div>
</main>
<footer>
  <p class="copy">&copy; 2026 Erimitis &nbsp;·&nbsp; Melbourne</p>
</footer>
<script>
  const canvas=document.getElementById('stars');const ctx=canvas.getContext('2d');
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const stars=Array.from({length:200},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.3+0.15,a:Math.random()*0.65+0.1,speed:Math.random()*0.003+0.0006,phase:Math.random()*Math.PI*2}));
  function draw(t){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(s=>{const alpha=s.a*(0.25+0.75*Math.sin(t*s.speed+s.phase));ctx.beginPath();ctx.arc(s.x*canvas.width,s.y*canvas.height,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(91,159,212,${alpha})`;ctx.fill();});requestAnimationFrame(draw);}
  requestAnimationFrame(draw);
  function openMobile(){document.getElementById('mobileMenu').classList.add('open');document.body.style.overflow='hidden';}
  function closeMobile(){document.getElementById('mobileMenu').classList.remove('open');document.body.style.overflow='';}
</script>
</body>
</html>
