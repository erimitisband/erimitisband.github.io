<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERIMITIS | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #02020a; --steel: #4682B4; --gold: #D4AF37; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Text', serif; overflow-x: hidden; }

        /* Navigation Header */
        .navbar { width: 100%; padding: 40px 50px; position: fixed; top: 0; z-index: 1000; display: flex; align-items: center; background: var(--bg); }
        .hamburger { display: flex; flex-direction: column; gap: 10px; cursor: pointer; width: 35px; position: absolute; left: 50px; }
        .hamburger span { width: 100%; height: 1px; background-color: var(--gold); }
        .brand-center { width: 100%; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(2.2rem, 8vw, 4.5rem); letter-spacing: 15px; color: var(--white); text-transform: uppercase; margin: 0; }

        /* Fullscreen PC Menu */
        #menu { display: none; list-style: none; text-align: center; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(2, 2, 10, 0.98); padding-top: 25vh; z-index: 2000; }
        #menu li { margin: 30px 0; }
        #menu a { text-decoration: underline; text-decoration-color: var(--steel); text-underline-offset: 12px; color: var(--white); font-family: 'Cinzel', serif; font-size: 2.2rem; letter-spacing: 8px; opacity: 0; transition: 0.4s; }

        /* Mobile Nav List */
        .nav-list-mobile { display: none; }
        @media (max-width: 1023px) {
            .hamburger { display: none; }
            .navbar { padding: 25px; position: relative; }
            .nav-list-mobile { display: flex; justify-content: center; gap: 20px; background: rgba(70, 130, 180, 0.08); border: 1px solid rgba(70, 130, 180, 0.2); padding: 15px; margin: 20px auto 0; width: 90%; list-style: none; position: relative; z-index: 100; }
            .nav-list-mobile a { color: var(--gold); text-decoration: none; font-family: 'Cinzel'; font-size: 0.75rem; letter-spacing: 1.5px; }
        }

        /* Contact Content */
        main { padding: 250px 10% 100px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .contact-item { margin-bottom: 40px; }
        .label { font-family: 'Cinzel', serif; color: var(--steel); font-size: 0.9rem; letter-spacing: 4px; display: block; margin-bottom: 10px; }
        .value { color: var(--white); font-size: clamp(1.4rem, 4vw, 2.2rem); text-decoration: none; transition: 0.3s; font-family: 'Cinzel', serif; }
        .value:hover { color: var(--gold); }
        .divider { width: 40px; height: 1px; background: var(--steel); margin: 20px auto; }
    </style>
</head>
<body>
    <nav class="navbar"><div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div><div class="brand-center"><h1>CONTACT</h1></div></nav>

    <ul class="nav-list-mobile">
        <li><a href="index.html">HOME</a></li>
        <li><a href="about.html">ABOUT</a></li>
        <li><a href="music.html">MUSIC</a></li>
        <li><a href="contact.html">CONTACT</a></li>
    </ul>

    <main>
        <div class="contact-item">
            <span class="label">Direct Enquiry</span>
            <a href="mailto:erimitisband@gmail.com" class="value">erimitisband@gmail.com</a>
        </div>
        <div class="divider"></div>
        <div class="contact-item">
            <span class="label">Instagram</span>
            <a href="https://instagram.com/erimitisband" target="_blank" class="value">@erimitisband</a>
        </div>
        <div class="divider"></div>
        <div class="contact-item">
            <span class="label">TikTok</span>
            <a href="https://tiktok.com/@erimitisband" target="_blank" class="value">@erimitisband</a>
        </div>
    </main>

    <div id="menu">
        <div style="position: absolute; top: 45px; left: 50px; color: var(--gold); cursor: pointer; font-family: 'Cinzel';" onclick="toggleMenu()">[ CLOSE ]</div>
        <ul style="list-style: none;">
            <li><a href="index.html">HOME</a></li>
            <li><a href="about.html">ABOUT</a></li>
            <li><a href="music.html">MUSIC</a></li>
            <li><a href="contact.html">CONTACT</a></li>
        </ul>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('menu');
            const links = document.querySelectorAll('#menu a');
            const isVisible = menu.style.display === 'block';
            menu.style.display = isVisible ? 'none' : 'block';
            if (!isVisible) {
                setTimeout(() => {
                    links.forEach((link, i) => {
                        setTimeout(() => { link.style.opacity = '1'; }, i * 100);
                    });
                }, 50);
            } else {
                links.forEach(link => link.style.opacity = '0');
            }
        }
    </script>
</body>
</html>
