<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERIMITIS | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #02020a; --steel: #4682B4; --gold: #D4AF37; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Text', serif; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        .desktop-nav { display: flex; align-items: center; padding: 40px 50px; position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--bg); }
        .hamburger { display: flex; flex-direction: column; gap: 10px; cursor: pointer; width: 35px; z-index: 2001; }
        .hamburger span { width: 100%; height: 1px; background-color: var(--gold); }
        
        .mobile-nav-boxes { display: none; width: 100%; padding: 15px; gap: 10px; position: fixed; bottom: 0; z-index: 1000; background: linear-gradient(transparent, var(--bg) 20%); flex-wrap: wrap; justify-content: center; }
        .nav-box { border: 1px solid var(--gold); padding: 18px; text-decoration: none; color: var(--white); font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 3px; flex: 1 1 45%; text-align: center; background: rgba(2, 2, 10, 0.95); }

        @media (max-width: 1024px) {
            .desktop-nav { display: none !important; }
            .mobile-nav-boxes { display: flex !important; }
            footer { padding-bottom: 140px; }
        }
        @media (min-width: 1025px) { .mobile-nav-boxes { display: none !important; } }

        #fullscreenMenu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(2, 2, 10, 0.98); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
        #fullscreenMenu a { color: var(--white); font-family: 'Cinzel', serif; font-size: 2.5rem; letter-spacing: 10px; text-decoration: underline; text-underline-offset: 15px; margin: 25px 0; }

        .brand-header { margin-top: 150px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 8vw, 2.5rem); letter-spacing: 15px; }
        
        main { flex: 1; padding: 50px 10%; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .enquiry { margin-bottom: 40px; }
        .label { font-family: 'Cinzel', serif; color: var(--steel); letter-spacing: 3px; font-size: 0.8rem; text-transform: uppercase; }
        .email { display: block; font-size: 1.5rem; color: var(--white); text-decoration: none; margin-top: 15px; font-family: 'Cinzel', serif; }
        
        footer { padding: 40px 0; text-align: center; font-family: 'Cinzel', serif; color: var(--gold); font-size: 0.6rem; letter-spacing: 3px; }
    </style>
</head>
<body>
    <nav class="desktop-nav"><div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div></nav>
    <div id="fullscreenMenu">
        <div style="position: absolute; top: 45px; left: 50px; color: var(--gold); cursor: pointer; font-family: 'Cinzel';" onclick="toggleMenu()">[ CLOSE ]</div>
        <a href="index.html">HOME</a><a href="about.html">ABOUT</a><a href="music.html">MUSIC</a><a href="contact.html">CONTACT</a>
    </div>

    <div class="brand-header"><h1>CONTACT</h1></div>
    <main>
        <div class="enquiry">
            <span class="label">Direct Enquiry</span>
            <a href="mailto:erimitisband@gmail.com" class="email">erimitisband@gmail.com</a>
        </div>
    </main>
    
    <footer>&copy; 2026 ERIMITIS. ALL RIGHTS RESERVED.</footer>

    <nav class="mobile-nav-boxes">
        <a href="index.html" class="nav-box">HOME</a>
        <a href="about.html" class="nav-box">ABOUT</a>
        <a href="music.html" class="nav-box">MUSIC</a>
        <a href="contact.html" class="nav-box" style="background: var(--gold); color: var(--bg);">CONTACT</a>
    </nav>

    <script>function toggleMenu() { const m = document.getElementById('fullscreenMenu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }</script>
</body>
</html>
