<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Erimitis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Crimson+Text&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #02020a; --steel: #5B9FD4; --gray: #B8952A; --white: #f0ede8; }
        body { 
            margin: 0; background: var(--bg); color: var(--white); 
            font-family: 'Crimson Text', serif; overflow: hidden;
        }

        /* Hero Background */
        .hero-bg {
            position: fixed; top: 0; left: 0; width: 110%; height: 110%;
            background: url('logo.jpg') center/cover no-repeat;
            opacity: 0.15; z-index: -2;
            animation: drift 20s infinite alternate linear;
        }
        @keyframes drift { from { transform: translate(0,0); } to { transform: translate(-2%,-2%); } }

        /* Stars Canvas */
        #starCanvas { position: fixed; top: 0; left: 0; z-index: -1; }

        nav { text-align: center; padding: 40px 0; }
        nav a {
            font-family: 'Cinzel', serif; color: var(--gray);
            text-decoration: none; margin: 0 20px; transition: 0.3s;
        }
        nav a:hover, nav a.active { color: var(--steel); }

        .contact-box {
            max-width: 500px; margin: 100px auto; padding: 20px;
        }
        .row {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(184, 149, 42, 0.3);
            padding: 20px 0; transition: 0.3s;
        }
        .row:hover { border-bottom-color: var(--steel); }
        .row:hover span { color: var(--steel); }
        
        .label { font-family: 'Cinzel', serif; color: var(--gray); letter-spacing: 2px; }
        .val { text-decoration: none; color: var(--white); font-style: italic; }

        @media (max-width: 768px) {
            nav { display: none; }
            .mobile-nav { display: flex; flex-direction: column; }
            .nav-card { 
                padding: 40px; text-align: center; border-bottom: 1px solid rgba(91,159,212,0.2);
                color: var(--steel); font-family: 'Cinzel', serif; text-decoration: none;
            }
        }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    <canvas id="starCanvas"></canvas>

    <nav>
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="music.html">MUSIC</a>
        <a href="contact.html" class="active">CONTACT</a>
    </nav>

    <div class="mobile-nav">
        <a href="index.html" class="nav-card">HOME</a>
        <a href="about.html" class="nav-card">ABOUT</a>
        <a href="music.html" class="nav-card">MUSIC</a>
        <a href="contact.html" class="nav-card">CONTACT</a>
    </div>

    <div class="contact-box">
        <div class="row">
            <span class="label">EMAIL</span>
            <a href="mailto:erimitisband@gmail.com" class="val">erimitisband@gmail.com</a>
        </div>
        <div class="row">
            <span class="label">INSTAGRAM</span>
            <a href="https://instagram.com/erimitis_band" target="_blank" class="val">@erimitis_band</a>
        </div>
        <div class="row">
            <span class="label">TIKTOK</span>
            <a href="https://tiktok.com/@erimitisband" target="_blank" class="val">@erimitisband</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        let stars = [];
        for(let i=0; i<200; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5 });
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(140, 180, 214, 0.8)";
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
