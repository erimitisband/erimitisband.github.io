<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERIMITIS | Home</title>
<style>
/* FONTS */
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Crimson+Text:ital@0;1&display=swap');

/* RESET */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* BASE — dark background is THE FIRST THING set */
html,body{
  background:#02020a;
  color:#f0ede8;
  font-family:'Crimson Text',Georgia,serif;
  font-size:18px;
  min-height:100vh;
  overflow-x:hidden;
}

/* STARS */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}

/* WRAPPER */
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* ── NAV BAR ── */
nav{
  position:fixed;top:0;left:0;right:0;height:60px;z-index:100;
  background:rgba(2,2,10,0.95);
  border-bottom:1px solid rgba(91,159,212,0.2);
  display:flex;align-items:center;justify-content:center;
}

/* HAMBURGER — 3 plain horizontal lines */
#hbtn{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;gap:6px;
  padding:8px;
  width:40px;height:40px;justify-content:center;align-items:center;
}
#hbtn span{
  display:block;
  width:22px;height:2px;
  background:#5B9FD4;
  border-radius:1px;
  transition:all 0.3s ease;
}

.brand{
  font-family:'Cinzel',serif;font-size:1rem;font-weight:700;
  letter-spacing:0.5em;color:#5B9FD4;text-decoration:none;
  text-transform:uppercase;padding-right:0.5em;
}

/* DROPDOWN */
#menu{
  position:fixed;top:60px;left:0;width:240px;
  background:rgba(5,5,20,0.98);
  border-right:1px solid rgba(91,159,212,0.15);
  z-index:99;
  transform:translateX(-100%);
  transition:transform 0.35s ease;
  padding:8px 0 24px;
}
#menu.open{transform:translateX(0)}
#menu a{
  display:block;padding:16px 32px;
  font-family:'Cinzel',serif;font-size:0.72rem;
  letter-spacing:0.3em;text-transform:uppercase;
  color:#f0ede8;text-decoration:none;
  border-left:2px solid transparent;
  transition:all 0.2s;
}
#menu a:hover,#menu a.on{
  color:#5B9FD4;border-left-color:#5B9FD4;padding-left:40px;
}
.mdiv{height:1px;background:rgba(91,159,212,0.1);margin:4px 24px}

/* OVERLAY */
#ov{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);
  z-index:98;display:none;
}
#ov.open{display:block}

/* ── HOME PAGE ── */
.home{
  flex:1;
  display:flex;flex-direction:column;align-items:center;
  padding-top:120px;padding-bottom:60px;
  text-align:center;padding-left:20px;padding-right:20px;
}

/* TITLE */
.htitle{
  font-family:'Cinzel',serif;
  font-size:clamp(2.8rem,11vw,6rem);
  font-weight:900;letter-spacing:0.35em;
  text-transform:uppercase;color:#f0ede8;
  line-height:1;padding-right:0.35em;
  animation:up 1.2s ease forwards;opacity:0;
}
.hline{
  width:120px;height:1px;
  background:linear-gradient(90deg,transparent,#B8952A,transparent);
  margin:20px auto 0;
  animation:up 1.2s ease 0.2s forwards;opacity:0;
}
.htag{
  font-family:'Crimson Text',Georgia,serif;
  font-style:italic;font-size:1.1rem;color:#8a8a9a;
  margin-top:12px;letter-spacing:0.05em;
  animation:up 1.2s ease 0.3s forwards;opacity:0;
}

/* FADED LOGO — scrolls with page below title */
.hlogo{
  margin-top:44px;
  width:clamp(260px,55vw,480px);
  height:clamp(260px,55vw,480px);
  border-radius:50%;overflow:hidden;
  border:1px solid rgba(91,159,212,0.1);
  animation:logo 1.6s ease 0.4s forwards;opacity:0;
}
.hlogo img{
  width:100%;height:100%;object-fit:cover;
  opacity:0.35;filter:brightness(0.85);display:block;
}

/* NAV BUTTONS */
.hnav{
  margin-top:44px;
  display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
  animation:up 1.2s ease 0.6s forwards;opacity:0;
}
.hnav a{
  font-family:'Cinzel',serif;font-size:0.68rem;
  letter-spacing:0.3em;text-transform:uppercase;
  color:#8a8a9a;text-decoration:none;
  padding:10px 22px;border:1px solid rgba(91,159,212,0.2);
  border-radius:2px;transition:all 0.25s;
}
.hnav a:hover{color:#5B9FD4;border-color:#5B9FD4;background:rgba(91,159,212,0.06)}

@keyframes up{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes logo{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── FOOTER ── */
footer{
  border-top:1px solid rgba(91,159,212,0.12);
  padding:28px 20px;text-align:center;
  background:rgba(2,2,10,0.85);
}
.fsoc{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:14px}
.fsoc a{
  display:flex;align-items:center;gap:7px;
  color:#8a8a9a;text-decoration:none;
  font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;
  transition:color 0.2s;
}
.fsoc a svg{width:16px;height:16px;flex-shrink:0}
.fsoc a:hover{color:#5B9FD4}
.fcopy{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.25em;text-transform:uppercase;color:#7a6218}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="wrap">

  <!-- NAV -->
  <nav>
    <button id="hbtn" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <a href="index.html" class="brand">Erimitis</a>
  </nav>

  <div id="ov"></div>
  <div id="menu">
    <a href="index.html" class="on">Home</a>
    <div class="mdiv"></div>
    <a href="about.html">About</a>
    <div class="mdiv"></div>
    <a href="music.html">Music</a>
    <div class="mdiv"></div>
    <a href="gallery.html">Gallery</a>
    <div class="mdiv"></div>
    <a href="contact.html">Contact</a>
  </div>

  <!-- HOME CONTENT -->
  <main class="home">
    <h1 class="htitle">Erimitis</h1>
    <div class="hline"></div>
    <p class="htag">From the shadows — something stirs.</p>

    <div class="hlogo">
      <img src="logo.jpg" alt="Erimitis" />
    </div>


  </main>

  <!-- FOOTER -->
  <footer>
    <div class="fsoc">
      <a href="mailto:erimitisband@gmail.com">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
        Email
      </a>
      <a href="https://www.instagram.com/erimitisband" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/></svg>
        Instagram
      </a>
      <a href="https://www.tiktok.com/@erimitisband" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.79 1.54V6.79a4.85 4.85 0 01-1.02-.1z"/></svg>
        TikTok

    </div>
    <p class="fcopy">&copy; 2026 Erimitis. All Rights Reserved.</p>
  </footer>

</div>

<script>
// STARS
(function(){
  var c=document.getElementById('stars'),x=c.getContext('2d'),s=[],W,H;
  function r(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
  function mk(){s=[];for(var i=0;i<180;i++)s.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.2,a:Math.random()*0.7+0.1,sp:Math.random()*0.25+0.05,tw:Math.random()*Math.PI*2})}
  function draw(){
    x.clearRect(0,0,W,H);
    s.forEach(function(p){
      p.tw+=0.011;
      var a=p.a*(0.55+0.45*Math.sin(p.tw));
      x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);
      x.fillStyle='rgba(240,237,232,'+a+')';x.fill();
      p.y-=p.sp;if(p.y<-2){p.y=H+2;p.x=Math.random()*W}
    });
    requestAnimationFrame(draw);
  }
  r();mk();draw();
  window.addEventListener('resize',function(){r();mk()});
})();

// NAV
(function(){
  var btn=document.getElementById('hbtn');
  var menu=document.getElementById('menu');
  var ov=document.getElementById('ov');
  var open=false;
  function toggle(){
    open=!open;
    menu.classList.toggle('open',open);
    ov.classList.toggle('open',open);
  }
  btn.addEventListener('click',toggle);
  ov.addEventListener('click',toggle);
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&open)toggle()});
  menu.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){if(open)toggle()})});
})();
</script>
</body>
</html>
