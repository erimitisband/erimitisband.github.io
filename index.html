<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERIMITIS | Official</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #02020a;
    --steel: #8CB4D6;
    --steel-glow: rgba(140,180,214,0.15);
    --white: #f0ede8;
    --gray: #888880;
    --dim: #333;
    --font-display: 'Cinzel', Georgia, serif;
    --font-body: 'Crimson Text', Georgia, serif;
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  html, body {
    width: 100%; height: 100%;
    overflow-x: hidden;
  }
 
  body {
    background-color: var(--bg);
    color: var(--white);
    font-family: var(--font-body);
    min-height: 100vh;
  }
 
  /* ── CANVAS STARS ── */
  #stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }
 
  /* ── HERO ── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1;
    padding: 2rem;
    text-align: center;
  }
 
  /* Vignette overlay */
  .hero::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(2,2,10,0.85) 100%);
    z-index: 0;
    pointer-events: none;
  }
 
  .hero-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
 
  .logo-wrap {
    width: 260px;
    height: 260px;
    margin-bottom: 2.5rem;
    position: relative;
    opacity: 0;
    animation: fadeIn 2s ease 0.5s forwards;
  }
 
  .logo-wrap::before {
    content: '';
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--steel-glow) 0%, transparent 70%);
    animation: pulse 4s ease-in-out infinite;
  }
 
  .logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    border: 1px solid rgba(140,180,214,0.2);
    filter: brightness(0.9);
  }
 
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.08); opacity: 1; }
  }
 
  .band-name {
    font-family: var(--font-display);
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    font-weight: 900;
    letter-spacing: 0.25em;
    color: var(--white);
    text-shadow: 0 0 60px var(--steel-glow), 0 0 120px rgba(140,180,214,0.08);
    opacity: 0;
    animation: fadeUp 1.5s ease 1s forwards;
    margin-bottom: 0.5rem;
  }
 
  .band-name span {
    color: var(--steel);
  }
 
  .est {
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 6px;
    color: var(--gray);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1.5s ease 1.3s forwards;
    margin-bottom: 2rem;
  }
 
  .divider-line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--steel), transparent);
    margin: 0 auto 2rem;
    opacity: 0;
    animation: fadeIn 1.5s ease 1.6s forwards;
  }
 
  .tagline {
    font-family: var(--font-body);
    font-style: italic;
    font-size: clamp(0.95rem, 2.5vw, 1.15rem);
    color: var(--gray);
    max-width: 520px;
    line-height: 2;
    opacity: 0;
    animation: fadeUp 1.5s ease 1.8s forwards;
    margin-bottom: 3rem;
  }
 
  .status-pill {
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--steel);
    border: 1px solid rgba(140,180,214,0.3);
    padding: 0.7rem 2rem;
    opacity: 0;
    animation: fadeUp 1.5s ease 2.1s forwards;
    position: relative;
    overflow: hidden;
  }
 
  .status-pill::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(140,180,214,0.08), transparent);
    animation: shimmer 3s ease infinite 3s;
  }
 
  @keyframes shimmer {
    0% { left: -100%; }
    100% { left: 100%; }
  }
 
  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.5rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(180deg, rgba(2,2,10,0.9) 0%, transparent 100%);
    backdrop-filter: blur(2px);
  }
 
  .nav-logo {
    font-family: var(--font-display);
    font-size: 0.7rem;
    letter-spacing: 5px;
    color: var(--steel);
    text-decoration: none;
    text-transform: uppercase;
  }
 
  nav ul {
    list-style: none;
    display: flex;
    gap: 2.5rem;
  }
 
  nav a {
    color: var(--gray);
    text-decoration: none;
    text-transform: uppercase;
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 3px;
    transition: color 0.3s ease;
    position: relative;
  }
 
  nav a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 0; height: 1px;
    background: var(--steel);
    transition: width 0.3s ease;
  }
 
  nav a:hover { color: var(--white); }
  nav a:hover::after, nav a.active::after { width: 100%; }
  nav a.active { color: var(--steel); }
 
  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 2;
    padding: 2rem;
    text-align: center;
    border-top: 1px solid #0d0d0d;
  }
 
  .social-links {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    margin-bottom: 1rem;
  }
 
  .social-links a {
    color: var(--dim);
    text-decoration: none;
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: color 0.3s ease;
  }
 
  .social-links a:hover { color: var(--steel); }
 
  .copyright {
    font-family: var(--font-display);
    font-size: 0.55rem;
    letter-spacing: 3px;
    color: #222;
    text-transform: uppercase;
  }
 
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
 
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
 
  @media (max-width: 600px) {
    nav { padding: 1.2rem 1.5rem; }
    nav ul { gap: 1.2rem; }
    .logo-wrap { width: 200px; height: 200px; }
  }
</style>
</head>
<body>
 
<canvas id="stars"></canvas>
 
<nav>
  <a href="index.html" class="nav-logo">Erimitis</a>
  <ul>
    <li><a href="index.html" class="active">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="music.html">Music</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>
 
<div class="hero">
  <div class="hero-content">
    <div class="logo-wrap">
      <img src="logo.jpg" alt="ERIMITIS" onerror="this.src='logo.png'">
    </div>
    <h1 class="band-name">ERIMITIS</h1>
    <p class="est">Melbourne &nbsp;·&nbsp; Est. 2026</p>
    <div class="divider-line"></div>
    <p class="tagline">Drawing from every decade of music since the 1960s —<br>raw power, emotional depth, and guitar-driven storytelling<br>woven into something that belongs to now.</p>
    <div class="status-pill">Music Coming</div>
  </div>
</div>
 
<footer>
  <div class="social-links">
    <a href="https://instagram.com/erimitisband" target="_blank">Instagram</a>
    <a href="https://tiktok.com/@erimitisband" target="_blank">TikTok</a>
    <a href="mailto:erimitisband@gmail.com">Email</a>
  </div>
  <p class="copyright">&copy; 2026 Erimitis</p>
</footer>
 
<script>
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
 
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
 
  const stars = Array.from({ length: 180 }, () => ({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.2 + 0.2,
    a: Math.random(),
    speed: Math.random() * 0.004 + 0.001,
    phase: Math.random() * Math.PI * 2
  }));
 
  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = s.a * (0.4 + 0.6 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(140,180,214,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
</script>
</body>
</html>
