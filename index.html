<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERIMITIS | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #02020a; --steel: #5B9FD4; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: var(--bg); color: var(--white); height: 100vh; width: 100vw; overflow: hidden; font-family: 'Crimson Text', serif; }

        /* UNIVERSAL ELEMENTS */
        .brand-header { position: absolute; top: 0; width: 100%; text-align: center; padding: 25px 0; z-index: 10; pointer-events: none; }
        h1 { font-family: 'Cinzel', serif; color: var(--steel); margin: 0; transition: 0.5s; }
        
        #ghostLogo { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; pointer-events: none; animation: breathe 10s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.15; } 50% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.25; } }

        #fullscreenMenu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(2, 2, 10, 0.98); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
        #fullscreenMenu a { color: var(--white); font-family: 'Cinzel', serif; font-size: 2.5rem; letter-spacing: 12px; margin: 25px 0; text-decoration: none; transition: 0.3s; }
        #fullscreenMenu a:hover { color: var(--steel); transform: scale(1.1); }

        /* PC LAYOUT */
        @media (min-width: 1025px) {
            h1 { font-size: 5rem; letter-spacing: 25px; }
            #ghostLogo { width: 40%; max-width: 600px; }
            .desktop-nav { position: fixed; top: 35px; left: 35px; z-index: 1000; cursor: pointer; display: block; }
            .hamburger { display: flex; flex-direction: column; gap: 8px; width: 35px; }
            .hamburger span { width: 100%; height: 2px; background-color: var(--steel); transition: 0.3s; }
            .pc-footer { position: fixed; bottom: 25px; width: 100%; text-align: center; font-family: 'Cinzel', serif; color: var(--steel); font-size: 0.6rem; letter-spacing: 4px; display: block; }
            .mobile-nav-stack { display: none; }
        }

        /* MOBILE LAYOUT */
        @media (max-width: 1024px) {
            h1 { font-size: 2.8rem; letter-spacing: 12px; }
            #ghostLogo { width: 85%; }
            .desktop-nav, .pc-footer { display: none; }
            .mobile-nav-stack { position: fixed; bottom: 0; width: 100%; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: linear-gradient(transparent, var(--bg) 25%); }
            .nav-box { border: 1px solid var(--steel); padding: 22px; text-decoration: none; color: var(--white); font-family: 'Cinzel', serif; text-align: center; font-size: 0.9rem; letter-spacing: 4px; background: rgba(2, 2, 10, 0.9); backdrop-filter: blur(10px); }
            .mobile-copyright { text-align: center; font-family: 'Cinzel', serif; color: var(--steel); font-size: 0.55rem; padding: 15px 0 10px; letter-spacing: 3px; }
        }
    </style>
</head>
<body>
    <div class="desktop-nav" onclick="toggleMenu()"><div class="hamburger"><span></span><span></span><span></span></div></div>
    <div id="fullscreenMenu">
        <div style="position: absolute; top: 35px; left: 35px; color: var(--steel); cursor: pointer; font-family: 'Cinzel';" onclick="toggleMenu()">[ CLOSE ]</div>
        <a href="index.html">HOME</a><a href="about.html">ABOUT</a><a href="music.html">MUSIC</a><a href="contact.html">CONTACT</a>
    </div>
    <header class="brand-header"><h1>ERIMITIS</h1></header>
    <img src="logo.jpg" id="ghostLogo" alt="Hermit">
    <div class="pc-footer">&copy; 2026 ERIMITIS. ALL RIGHTS RESERVED.</div>
    <nav class="mobile-nav-stack">
        <a href="index.html" class="nav-box" style="background: var(--steel); color: var(--bg);">HOME</a>
        <a href="about.html" class="nav-box">ABOUT</a>
        <a href="music.html" class="nav-box">MUSIC</a>
        <a href="contact.html" class="nav-box">CONTACT</a>
        <div class="mobile-copyright">&copy; 2026 ERIMITIS. ALL RIGHTS RESERVED.</div>
    </nav>
    <script>function toggleMenu(){ const m = document.getElementById('fullscreenMenu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }</script>
</body>
</html>
