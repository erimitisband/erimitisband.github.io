<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERIMITIS | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #02020a; --steel: #4682B4; --gold: #D4AF37; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Text', serif; overflow-x: hidden; min-height: 200vh; }

        /* The Hermit - Visibility & Motion */
        #ghostLogo { 
            position: fixed; 
            top: 55%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 85%; 
            max-width: 600px; 
            opacity: 0.28; 
            z-index: -1; 
            pointer-events: none; 
            transition: transform 0.1s linear;
        }

        /* PREMIUM HORIZON NAVIGATION */
        .navbar { 
            width: 100%; 
            padding: 40px 50px; 
            position: fixed; 
            top: 0; 
            z-index: 1000; 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center;
        }

        /* Hamburger far left (PC/Desktop) */
        .hamburger { 
            grid-column: 1;
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            cursor: pointer; 
            width: 35px;
        }
        .hamburger span { width: 100%; height: 1px; background-color: var(--gold); transition: 0.4s; }

        /* Centered Band Name */
        .brand-center { grid-column: 2; }
        h1 { 
            font-family: 'Cinzel', serif; 
            font-size: clamp(2.2rem, 8vw, 4.5rem); 
            letter-spacing: 15px; 
            color: var(--white); 
            text-transform: uppercase;
            margin: 0;
            white-space: nowrap;
        }

        /* FULLSCREEN MENU (PC Hamburger Content) */
        .nav-links { 
            display: none; 
            list-style: none; 
            text-align: center; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100vh; 
            background: rgba(2, 2, 10, 0.98); 
            padding-top: 25vh; 
            z-index: 1001;
        }
        .nav-links li { margin: 30px 0; }
        .nav-links a { 
            text-decoration: underline; 
            text-decoration-color: var(--steel);
            text-underline-offset: 12px;
            color: var(--white); 
            font-family: 'Cinzel', serif; 
            font-size: 2.2rem; 
            letter-spacing: 8px; 
            opacity: 0; 
            transition: 0.4s; 
        }
        .nav-links a:hover { color: var(--gold); }

        /* Close Button inside Menu */
        .close-menu {
            position: absolute;
            top: 45px;
            left: 50px;
            color: var(--gold);
            font-family: 'Cinzel';
            font-size: 0.8rem;
            letter-spacing: 2px;
            cursor: pointer;
        }

        /* MOBILE & TABLET NAVIGATION BOX */
        .nav-box-mobile { display: none; }

        @media (max-width: 1023px) {
            .hamburger { display: none; }
            .navbar { padding: 25px; grid-template-columns: 1fr; text-align: center; }
            .brand-center { grid-column: 1; margin-bottom: 20px; }
            
            .nav-box-mobile {
                display: flex;
                justify-content: center;
                gap: 20px;
                background: rgba(70, 130, 180, 0.08);
                border: 1px solid rgba(70, 130, 180, 0.2);
                padding: 15px;
                margin: 0 auto;
                width: 90%;
                list-style: none;
            }
            .nav-box-mobile a { 
                color: var(--gold); 
                text-decoration: none; 
                font-family: 'Cinzel'; 
                font-size: 0.75rem; 
                letter-spacing: 1.5px; 
            }
        }
    </style>
</head>
<body>

    <img src="logo.jpg" id="ghostLogo">

    <nav class="navbar">
        <div class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        
        <div class="brand-center">
            <h1>ERIMITIS</h1>
        </div>
    </nav>

    <div style="position: fixed; top: 110px; width: 100%; z-index: 999;">
        <ul class="nav-box-mobile">
            <li><a href="index.html">HOME</a></li>
            <li><a href="about.html">ABOUT</a></li>
            <li><a href="music.html">MUSIC</a></li>
            <li><a href="contact.html">CONTACT</a></li>
        </ul>
    </div>

    <div class="nav-links" id="menu">
        <div class="close-menu" onclick="toggleMenu()">[ CLOSE ]</div>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="about.html">ABOUT</a></li>
            <li><a href="music.html">MUSIC</a></li>
            <li><a href="contact.html">CONTACT</a></li>
        </ul>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('menu');
            const links = document.querySelectorAll('.nav-links a');
            const isVisible = menu.style.display === 'block';
            
            menu.style.display = isVisible ? 'none' : 'block';
            
            if (!isVisible) {
                setTimeout(() => {
                    links.forEach((link, i) => {
                        setTimeout(() => { link.style.opacity = '1'; }, i * 100);
                    });
                }, 50);
            } else {
                links.forEach(link => link.style.opacity = '0');
            }
        }

        window.addEventListener('scroll', () => {
            const logo = document.getElementById('ghostLogo');
            let offset = window.pageYOffset;
            logo.style.transform = `translate(-50%, calc(-50% - ${offset * 0.25}px))`;
        });
    </script>
</body>
</html>
