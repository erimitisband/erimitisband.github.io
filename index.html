<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERIMITIS | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #02020a; --steel: #4682B4; --gold: #D4AF37; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Text', serif; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        /* Pre-loader */
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 1.5s ease; }
        #preloader.fade-out { opacity: 0; pointer-events: none; }
        .loader-e { font-family: 'Cinzel', serif; font-size: 5rem; color: var(--gold); letter-spacing: 10px; animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } }

        /* PC NAVIGATION */
        .desktop-nav { display: flex; align-items: center; padding: 40px 50px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .hamburger { display: flex; flex-direction: column; gap: 10px; cursor: pointer; width: 35px; z-index: 2001; }
        .hamburger span { width: 100%; height: 1px; background-color: var(--gold); }
        
        /* MOBILE BOTTOM NAVIGATION (Longer Boxes) */
        .mobile-nav-boxes { display: none; width: 100%; padding: 15px; gap: 10px; position: fixed; bottom: 0; z-index: 1000; background: linear-gradient(transparent, var(--bg) 20%); flex-wrap: wrap; justify-content: center; }
        .nav-box { 
            border: 1px solid var(--gold); padding: 18px; text-decoration: none; color: var(--white); 
            font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 3px; 
            flex: 1 1 45%; /* Makes them long and 2-per-row */
            text-align: center; background: rgba(2, 2, 10, 0.9);
        }

        /* Responsive Switch */
        @media (max-width: 1024px) {
            .desktop-nav { display: none !important; }
            .mobile-nav-boxes { display: flex !important; }
            footer { padding-bottom: 120px; } /* Space so footer isn't hidden by boxes */
        }
        @media (min-width: 1025px) {
            .mobile-nav-boxes { display: none !important; }
        }

        /* PC Menu */
        #fullscreenMenu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(2, 2, 10, 0.98); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
        #fullscreenMenu a { color: var(--white); font-family: 'Cinzel', serif; font-size: 2.5rem; letter-spacing: 10px; text-decoration: underline; text-decoration-color: var(--steel); text-underline-offset: 15px; margin: 25px 0; }

        .brand-header { margin-top: 200px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 10vw, 5rem); letter-spacing: 20px; }
        
        #ghostLogo { position: fixed; top: 55%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 650px; opacity: 0.2; z-index: -1; pointer-events: none; }
        main { flex: 1; }
        footer { padding: 40px 0; text-align: center; font-family: 'Cinzel', serif; color: var(--gold); font-size: 0.6rem; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div id="preloader"><div class="loader-e">E</div></div>

    <nav class="desktop-nav"><div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div></nav>

    <div id="fullscreenMenu">
        <div style="position: absolute; top: 45px; left: 50px; color: var(--gold); cursor: pointer; font-family: 'Cinzel';" onclick="toggleMenu()">[ CLOSE ]</div>
        <a href="index.html">HOME</a><a href="about.html">ABOUT</a><a href="music.html">MUSIC</a><a href="contact.html">CONTACT</a>
    </div>

    <div class="brand-header"><h1>ERIMITIS</h1></div>
    <img src="logo.jpg" id="ghostLogo">
    <main></main>
    
    <footer>&copy; 2026 ERIMITIS. ALL RIGHTS RESERVED.</footer>

    <nav class="mobile-nav-boxes">
        <a href="index.html" class="nav-box" style="background: var(--gold); color: var(--bg);">HOME</a>
        <a href="about.html" class="nav-box">ABOUT</a>
        <a href="music.html" class="nav-box">MUSIC</a>
        <a href="contact.html" class="nav-box">CONTACT</a>
    </nav>

    <script>
        window.addEventListener('load', () => { setTimeout(() => { document.getElementById('preloader').classList.add('fade-out'); }, 2000); });
        function toggleMenu() { const m = document.getElementById('fullscreenMenu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
    </script>
</body>
</html>
