<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERIMITIS | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #02020a; --steel: #4682B4; --gold: #D4AF37; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Text', serif; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Pre-loader */
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 1.5s ease; }
        #preloader.fade-out { opacity: 0; pointer-events: none; }
        .loader-e { font-family: 'Cinzel', serif; font-size: 5rem; color: var(--gold); letter-spacing: 10px; animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } }

        /* Navigation Boxes for Mobile & PC */
        .nav-container { width: 100%; padding: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; position: fixed; top: 0; z-index: 1000; background: var(--bg); }
        .nav-box { 
            border: 1px solid var(--gold); padding: 10px 20px; text-decoration: none; color: var(--white); 
            font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 2px; transition: 0.3s;
        }
        .nav-box:hover { background: var(--gold); color: var(--bg); }

        .brand-header { margin-top: 150px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 10vw, 5rem); letter-spacing: 20px; color: var(--white); text-transform: uppercase; }
        
        #ghostLogo { position: fixed; top: 55%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 650px; opacity: 0.2; z-index: -1; pointer-events: none; }
        main { flex: 1; }
        footer { padding: 40px 0; text-align: center; font-family: 'Cinzel', serif; color: var(--gold); font-size: 0.6rem; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div id="preloader"><div class="loader-e">E</div></div>
    <nav class="nav-container">
        <a href="index.html" class="nav-box">HOME</a>
        <a href="about.html" class="nav-box">ABOUT</a>
        <a href="music.html" class="nav-box">MUSIC</a>
        <a href="contact.html" class="nav-box">CONTACT</a>
    </nav>
    <div class="brand-header"><h1>ERIMITIS</h1></div>
    <img src="logo.jpg" id="ghostLogo">
    <main></main>
    <footer>&copy; 2026 ERIMITIS. ALL RIGHTS RESERVED.</footer>
    <script>
        window.addEventListener('load', () => { setTimeout(() => { document.getElementById('preloader').classList.add('fade-out'); }, 2000); });
    </script>
</body>
</html>
