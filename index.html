<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERIMITIS | Official</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #e0e0e0;
            --accent-color: #666; 
            --font-main: 'Georgia', serif; /* More cinematic/classic feel */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            letter-spacing: 2px;
        }

        header {
            padding: 3rem 1rem;
            text-align: center;
        }

        /* Fixed Logo Logic */
        .logo img {
            max-width: 400px;
            width: 100%;
            height: auto;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
        }

        nav { margin-top: 2rem; }
        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        nav a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav a:hover { color: #fff; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            text-transform: uppercase;
            color: #888;
        }

        footer { padding: 3rem; }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .social-links a {
            color: var(--accent-color);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.7rem;
        }

        .social-links a:hover { color: #fff; }

        @media (max-width: 600px) {
            nav ul { gap: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo.jpg" alt="ERIMITIS">
        </div>
        
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="music.html">Music</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Seeking: Bassist · Vocalist · Drummer</h1>
    </main>

    <footer>
        <div class="social-links">
            <a href="https://instagram.com/erimitisband" target="_blank">Instagram</a>
            <a href="https://tiktok.com/@erimitisband" target="_blank">TikTok</a>
            <a href="mailto:erimitisband@gmail.com">Email</a>
        </div>
    </footer>

</body>
</html>
