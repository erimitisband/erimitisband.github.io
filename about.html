<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERIMITIS | About</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #02020a; --steel: #4682B4; --gold: #D4AF37; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Text', serif; display: flex; flex-direction: column; min-height: 100vh; }
        .navbar { width: 100%; padding: 40px 50px; position: fixed; top: 0; z-index: 1000; display: flex; align-items: center; background: var(--bg); }
        .hamburger { display: flex; flex-direction: column; gap: 10px; cursor: pointer; width: 35px; position: absolute; left: 50px; z-index: 1001; }
        .hamburger span { width: 100%; height: 1px; background-color: var(--gold); }
        .brand-center { width: 100%; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(2.2rem, 8vw, 4.5rem); letter-spacing: 15px; color: var(--white); text-transform: uppercase; margin: 0; }
        main { flex: 1; padding: 220px 15% 100px; text-align: center; }
        .enigma-long { font-size: clamp(1.2rem, 3vw, 1.8rem); color: var(--steel); font-style: italic; line-height: 1.8; max-width: 1000px; margin: 0 auto; }
        #menu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(2, 2, 10, 0.98); padding-top: 25vh; z-index: 2000; text-align: center; }
        #menu a { display: block; margin: 30px 0; color: var(--white); font-family: 'Cinzel', serif; font-size: 2.2rem; letter-spacing: 8px; text-decoration: underline; text-underline-offset: 12px; opacity: 0; transition: 0.4s; }
        footer { padding: 60px 0 30px; text-align: center; }
        footer p { font-family: 'Cinzel', serif; color: var(--gold); font-size: 0.7rem; letter-spacing: 3px; }
    </style>
</head>
<body>
    <nav class="navbar"><div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div><div class="brand-center"><h1>ABOUT</h1></div></nav>
    <main><p class="enigma-long">We exist in the friction between the heavy and the ethereal. Reborn in the silence of the iron woods.</p></main>
    <footer><p>&copy; 2026 ERIMITIS. ALL RIGHTS RESERVED.</p></footer>
    <div id="menu">
        <div style="position: absolute; top: 45px; left: 50px; color: var(--gold); cursor: pointer; font-family: 'Cinzel';" onclick="toggleMenu()">[ CLOSE ]</div>
        <a href="index.html">HOME</a><a href="about.html">ABOUT</a><a href="music.html">MUSIC</a><a href="contact.html">CONTACT</a>
    </div>
    <script>
        function toggleMenu() {
            const menu = document.getElementById('menu'); const links = document.querySelectorAll('#menu a');
            const isVisible = menu.style.display === 'block'; menu.style.display = isVisible ? 'none' : 'block';
            if (!isVisible) { setTimeout(() => { links.forEach((link, i) => { setTimeout(() => { link.style.opacity = '1'; }, i * 100); }); }, 50); }
        }
    </script>
</body>
</html>
