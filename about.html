<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERIMITIS | About</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #02020a; --steel: #4682B4; --gold: #D4AF37; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Text', serif; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation Boxes */
        .nav-container { width: 100%; padding: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; position: fixed; top: 0; z-index: 1000; background: var(--bg); }
        .nav-box { 
            border: 1px solid var(--gold); padding: 10px 20px; text-decoration: none; color: var(--white); 
            font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 2px; transition: 0.3s;
        }
        .nav-box:hover { background: var(--gold); color: var(--bg); }
        
        /* Highlight the current page */
        .active-box { background: var(--gold); color: var(--bg); }

        .page-title { margin-top: 120px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 8vw, 2.5rem); letter-spacing: 15px; color: var(--white); text-transform: uppercase; }

        main { flex: 1; padding: 60px 10%; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .about-text { 
            font-size: clamp(1.1rem, 3vw, 1.5rem); color: var(--steel); font-style: italic; 
            line-height: 1.8; max-width: 800px; margin: 0 auto; letter-spacing: 1px;
        }

        footer { padding: 40px 0; text-align: center; font-family: 'Cinzel', serif; color: var(--gold); font-size: 0.6rem; letter-spacing: 3px; }
    </style>
</head>
<body>
    <nav class="nav-container">
        <a href="index.html" class="nav-box">HOME</a>
        <a href="about.html" class="nav-box active-box">ABOUT</a>
        <a href="music.html" class="nav-box">MUSIC</a>
        <a href="contact.html" class="nav-box">CONTACT</a>
    </nav>

    <div class="page-title"><h1>ABOUT</h1></div>

    <main>
        <p class="about-text">
            We exist in the friction between the heavy and the ethereal. <br>
            A collective shadow reborn in the silence of the iron woods.
        </p>
    </main>

    <footer>&copy; 2026 ERIMITIS. ALL RIGHTS RESERVED.</footer>
</body>
</html>
