<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERIMITIS | Gallery</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Crimson+Text:ital@0;1&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#02020a;color:#f0ede8;font-family:'Crimson Text',Georgia,serif;font-size:18px;min-height:100vh;overflow-x:hidden}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
nav{position:fixed;top:0;left:0;right:0;height:60px;z-index:100;background:rgba(2,2,10,0.95);border-bottom:1px solid rgba(91,159,212,0.2);display:flex;align-items:center;justify-content:center}
#hbtn{position:absolute;left:16px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;display:flex;flex-direction:column;gap:6px;padding:8px;width:40px;height:40px;justify-content:center;align-items:center}
#hbtn span{display:block;width:22px;height:2px;background:#5B9FD4;border-radius:1px;transition:all 0.3s ease}
.brand{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;letter-spacing:0.5em;color:#5B9FD4;text-decoration:none;text-transform:uppercase;padding-right:0.5em}
#menu{position:fixed;top:60px;left:0;width:240px;background:rgba(5,5,20,0.98);border-right:1px solid rgba(91,159,212,0.15);z-index:99;transform:translateX(-100%);transition:transform 0.35s ease;padding:8px 0 24px}
#menu.open{transform:translateX(0)}
#menu a{display:block;padding:16px 32px;font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.3em;text-transform:uppercase;color:#f0ede8;text-decoration:none;border-left:2px solid transparent;transition:all 0.2s}
#menu a:hover,#menu a.on{color:#5B9FD4;border-left-color:#5B9FD4;padding-left:40px}
.mdiv{height:1px;background:rgba(91,159,212,0.1);margin:4px 24px}
#ov{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:98;display:none}
#ov.open{display:block}
.ptitle{padding-top:110px;padding-bottom:8px;text-align:center}
.ptitle h1{font-family:'Cinzel',serif;font-size:clamp(1.8rem,7vw,3.8rem);font-weight:900;letter-spacing:0.25em;text-transform:uppercase;color:#f0ede8;line-height:1.1;padding-right:0.25em}
.ptitle h1::after{content:'';display:block;width:50%;height:1px;background:linear-gradient(90deg,transparent,#B8952A,transparent);margin:18px auto 0}
.content{flex:1;max-width:860px;width:100%;margin:0 auto;padding:40px 24px 72px}
footer{border-top:1px solid rgba(91,159,212,0.12);padding:28px 20px;text-align:center;background:rgba(2,2,10,0.85)}
.fsoc{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:14px}
.fsoc a{display:flex;align-items:center;gap:7px;color:#8a8a9a;text-decoration:none;font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;transition:color 0.2s}
.fsoc a svg{width:16px;height:16px;flex-shrink:0}
.fsoc a:hover{color:#5B9FD4}
.fcopy{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.25em;text-transform:uppercase;color:#7a6218}
.cs{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;text-align:center;border:1px solid rgba(91,159,212,0.12);border-radius:4px;background:rgba(7,7,26,0.4);padding:40px 24px}
.cs-icon{width:52px;height:52px;border:1px solid rgba(184,149,42,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#7a6218;margin-bottom:22px}
.cs-icon svg{width:24px;height:24px}
.cs h2{font-family:'Cinzel',serif;font-size:clamp(1.1rem,4vw,1.6rem);font-weight:700;letter-spacing:0.35em;text-transform:uppercase;color:#f0ede8;margin-bottom:14px}
.cs p{font-family:'Crimson Text',Georgia,serif;font-style:italic;color:#8a8a9a;font-size:1rem;max-width:380px;line-height:1.7;margin:0}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="wrap">
  <nav>
    <button id="hbtn" aria-label="Menu"><span></span><span></span><span></span></button>
    
  </nav>
  <div id="ov"></div>
  <div id="menu">
    <a href="index.html">Home</a>
    <div class="mdiv"></div>
    <a href="about.html">About</a>
    <div class="mdiv"></div>
    <a href="music.html">Music</a>
    <div class="mdiv"></div>
    <a href="gallery.html" class="on">Gallery</a>
    <div class="mdiv"></div>
    <a href="contact.html">Contact</a>

  <div class="ptitle"><h1>Gallery</h1></div>

  <main class="content">
    <div class="cs">
      <div class="cs-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
      </div>
      <h2>Coming Soon</h2>
      <p>Photo shoots are on the horizon. When they exist, they will live here. Watch this space.</p>

  <footer>
    <div class="fsoc">
      <a href="mailto:erimitisband@gmail.com"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>Email</a>

      <a href="https://www.tiktok.com/@erimitisband" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.79 1.54V6.79a4.85 4.85 0 01-1.02-.1z"/></svg>TikTok</a>

</div>
<script>
(function(){var c=document.getElementById("stars"),x=c.getContext("2d"),s=[],W,H;function r(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}function mk(){s=[];for(var i=0;i<180;i++)s.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.2,a:Math.random()*0.7+0.1,sp:Math.random()*0.25+0.05,tw:Math.random()*Math.PI*2})}function draw(){x.clearRect(0,0,W,H);s.forEach(function(p){p.tw+=0.011;var a=p.a*(0.55+0.45*Math.sin(p.tw));x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle="rgba(240,237,232,"+a+")";x.fill();p.y-=p.sp;if(p.y<-2){p.y=H+2;p.x=Math.random()*W}});requestAnimationFrame(draw)}r();mk();draw();window.addEventListener("resize",function(){r();mk()})})();
(function(){var btn=document.getElementById("hbtn"),menu=document.getElementById("menu"),ov=document.getElementById("ov"),open=false;function toggle(){open=!open;menu.classList.toggle("open",open);ov.classList.toggle("open",open)}btn.addEventListener("click",toggle);ov.addEventListener("click",toggle);document.addEventListener("keydown",function(e){if(e.key==="Escape"&&open)toggle()});menu.querySelectorAll("a").forEach(function(a){a.addEventListener("click",function(){if(open)toggle()})})})();
</script>
</body>
</html>
